services:
  postgres:
    image: postgres:16-alpine
    container_name: bankofgraeme-db
    environment:
      POSTGRES_DB: bankofgraeme
      POSTGRES_USER: bankadmin
      POSTGRES_PASSWORD: BankDev123!
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
