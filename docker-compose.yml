services:
  postgres:
    image: postgres:16-alpine
    container_name: bankofgraeme-db
    environment:
      POSTGRES_DB: bankofgraeme
      POSTGRES_USER: bankadmin
      POSTGRES_PASSWORD: BankDev123!
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bankadmin -d bankofgraeme"]
      interval: 3s
      timeout: 3s
      retries: 10

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: bankofgraeme-azurite
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 10000"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
