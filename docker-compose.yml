services:
  postgres:
    image: postgres:16-alpine
    container_name: bankofgraeme-db
    environment:
      POSTGRES_DB: bankofgraeme
      POSTGRES_USER: bankadmin
      POSTGRES_PASSWORD: BankDev123!
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bankadmin -d bankofgraeme"]
      interval: 3s
      timeout: 3s
      retries: 10

  neo4j:
    image: neo4j:5-community
    container_name: bankofgraeme-neo4j
    environment:
      NEO4J_AUTH: neo4j/neo4jdev123
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4jdata:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: bankofgraeme-azurite
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 10000"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  neo4jdata:
